<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html, body {
    height:100%; overflow:hidden;
    font-family:'Kosugi Maru', sans-serif;
    background:#0d1b2a;
    color:#fff;
  }
  #app { position:relative; width:100%; height:100vh; max-width:480px; margin:0 auto;
    background:linear-gradient(180deg,#bce6f5 0%, #8fd0ea 45%, #a9dcc0 60%, #5c9e78 100%);
    overflow:hidden; }

  .screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; }
  .screen.active { display:flex; }

  /* タイトル */
  #screen-title { justify-content:flex-start; padding-top:50px; }
  #screen-title .logo { width:78%; max-width:320px; filter:drop-shadow(0 8px 10px rgba(0,0,0,0.25)); }
  .title-buttons { margin-top:auto; margin-bottom:50px; display:flex; flex-direction:column; gap:14px; width:70%; }
  .tbtn {
    padding:15px; border:none; border-radius:18px; font-size:16px; font-weight:bold; cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,0.25); font-family:'Kosugi Maru', sans-serif;
  }
  .tbtn:active { transform:translateY(3px); box-shadow:none; }
  .tbtn.start { background:#2980b9; color:#fff; }
  .tbtn.rank  { background:#4ecb71; color:#fff; }
  .tbtn.help  { background:#fff; color:#2980b9; }
  .ver { position:absolute; top:8px; left:10px; font-size:10px; color:rgba(255,255,255,0.8); }

  /* パネル画面共通 */
  .panel-screen { justify-content:center; padding:20px; }
  .panel-box { background:#fff; border-radius:22px; padding:28px 22px; width:100%; max-width:340px; text-align:center; box-shadow:0 6px 0 #a8d4c8; color:#2c5040; }
  .panel-title { font-size:17px; font-weight:bold; color:#e8734a; margin-bottom:16px; }
  .name-input { width:100%; padding:13px; font-size:16px; border-radius:14px; border:2px solid #bfe3d8; text-align:center; margin-bottom:10px; color:#333; font-family:'Kosugi Maru', sans-serif; }
  .hint { font-size:11px; color:#8fada0; margin-bottom:16px; }
  .btn { padding:14px 20px; border:none; border-radius:16px; font-size:15px; font-weight:bold; cursor:pointer; width:100%;
    box-shadow:0 4px 0 rgba(0,0,0,0.2); margin-top:8px; font-family:'Kosugi Maru', sans-serif; }
  .btn:active { transform:translateY(3px); box-shadow:none; }
  .btn.primary { background:#2980b9; color:#fff; }
  .btn.confirm { background:#4ecb71; color:#fff; }
  .btn.ghost { background:transparent; color:#8fada0; box-shadow:none; font-size:12px; text-decoration:underline; margin-top:10px; }
  .help-body { text-align:left; font-size:14px; line-height:2; margin-bottom:6px; }

  /* プレイ画面 */
  #screen-play {
    justify-content:flex-start; padding-top:0;
  }
  #bgImg {
    position:absolute; top:0; left:0; width:100%; height:100%;
    object-fit:cover; object-position:32% 45%;
    z-index:0; display:block;
  }
  #screen-play::after {
    content:"";
    position:absolute; inset:0;
    background:rgba(255,255,255,0.03);
    z-index:0;
  }

  #hudTop { position:absolute; top:14px; left:0; right:0; z-index:3; display:flex; gap:14px; justify-content:center; }
  .hud-box { background:rgba(255,255,255,0.9); color:#2c5040; padding:8px 18px; border-radius:16px; font-size:15px; font-weight:bold; box-shadow:0 3px 0 rgba(0,0,0,0.1); }
  .hud-box .val { color:#e8734a; font-size:20px; }
  #timerBox { position:absolute; top:70px; left:0; right:0; z-index:3; text-align:center; font-size:24px; font-weight:900; color:#fff; text-shadow:2px 2px 0 rgba(0,0,0,0.4); }
  #timerBox.warn { color:#ffe08a; animation:pulse 0.5s infinite; }
  @keyframes pulse { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.15); } }

  #holeField {
    position:absolute; inset:0; z-index:1;
  }
  .hole {
    position:absolute; width:150px; height:170px;
    transform:translate(-50%,-50%);
    display:flex; align-items:flex-end; justify-content:center;
    cursor:pointer;
  }
  .hole::before {
    content:"";
    position:absolute; bottom:2px; left:50%; transform:translateX(-50%);
    width:70px; height:12px;
    background:rgba(0,0,0,0.18);
    border-radius:50%;
    filter:blur(2px);
  }
  .hole img {
    position:absolute; bottom:0; left:50%;
    width:100%; transform:translate(-50%, 40%) scale(0.75);
    opacity:0; pointer-events:none;
    filter:drop-shadow(0 6px 6px rgba(0,0,0,0.35));
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.15s ease-out;
    z-index:2;
  }
  .hole img.show {
    transform:translate(-50%, 0%) scale(1);
    opacity:1;
  }
  .hole img.hit {
    animation:none;
    transform:translate(-50%, 45%) scale(0.8) rotate(-8deg);
    opacity:0;
    transition: transform 0.18s ease-in, opacity 0.18s ease-in;
  }

  .hammer-fx {
    position:absolute; width:210px; pointer-events:none; z-index:20;
    transform:translate(-30%,-70%) rotate(-25deg);
    filter:drop-shadow(0 4px 6px rgba(0,0,0,0.4));
    animation:hammerSwing 0.22s ease-out forwards;
  }
  @keyframes hammerSwing {
    0% { transform:translate(-10%,-120%) rotate(-60deg); opacity:0; }
    40% { opacity:1; }
    100% { transform:translate(-30%,-40%) rotate(-10deg); opacity:0; }
  }

  .pop-score {
    position:absolute; font-weight:900; font-size:24px; color:#fff;
    text-shadow:2px 2px 0 rgba(0,0,0,0.5), -1px -1px 0 rgba(0,0,0,0.5);
    pointer-events:none; z-index:21;
    animation:popScore 0.7s ease-out forwards;
  }
  @keyframes popScore {
    0% { transform:translateY(0); opacity:1; }
    100% { transform:translateY(-50px); opacity:0; }
  }

  #bonusBanner {
    position:absolute; top:36%; left:50%; transform:translate(-50%,-50%); z-index:25;
    background:rgba(255,255,255,0.95); color:#e8734a; font-weight:bold; font-size:20px;
    padding:14px 22px; border-radius:18px; box-shadow:0 6px 0 rgba(0,0,0,0.2); display:none; text-align:center;
  }

  /* 結果画面 */
  .result-icon { width:100px; margin-bottom:6px; }
  .result-title { font-size:22px; color:#e8734a; font-weight:bold; margin-bottom:14px; }
  .result-rows { text-align:left; margin:10px 0; }
  .result-row { display:flex; justify-content:space-between; padding:9px 4px; border-bottom:1px solid #eef7f4; font-size:15px; }
  .result-btns { display:flex; gap:10px; margin-top:16px; }

  /* ランキング */
  #screen-ranking { justify-content:flex-start; padding:20px 16px; }
  .rank-table { background:#fff; border-radius:18px; padding:12px; width:100%; max-width:340px; flex:1; overflow-y:auto; box-shadow:0 6px 0 #a8d4c8; }
  .rank-hdr, .rank-item { display:grid; grid-template-columns:34px 1fr 80px; font-size:13px; padding:8px 4px; align-items:center; color:#2c5040; }
  .rank-hdr { color:#8fada0; border-bottom:1px solid #dff3ee; padding-bottom:8px; font-weight:bold; }
  .rank-item { border-bottom:1px solid #eef7f4; }
  .rank-pos { font-weight:bold; }
  .rank-empty { text-align:center; color:#8fada0; font-size:12px; padding:30px 0; }
  .rank-bottom { margin-top:14px; width:100%; max-width:340px; }
</style>
</head>

  <!-- タイトル -->

  document.getElementById(id).classList.add('active');
}
function goToTitle(){ showScreen('screen-title'); }
function goToName(){
  document.getElementById('nameInput').value = playerName;
  showScreen('screen-name');
}
function showHelp(){ showScreen('screen-help'); }

function startGameFlow(){
  ensureAudio();
  const v = document.getElementById('nameInput') ? document.getElementById('nameInput').value.trim() : playerName;
  playerName = v || 'ドライバー';
  localStorage.setItem('sekineDaisakusenName', playerName);
  startGame();
}

/* ============ 穴の配置 ============ */
const HOLE_POSITIONS = [
  {x:14, y:64}, {x:50, y:60}, {x:86, y:64},
  {x:16, y:84}, {x:50, y:88}, {x:84, y:84}
];

let holes = [];
function buildHoles(){
  const field = document.getElementById('holeField');
  field.innerHTML = '';
  holes = HOLE_POSITIONS.map((pos, i)=>{
    const div = document.createElement('div');
    div.className = 'hole';
    div.style.left = pos.x + '%';
    div.style.top = pos.y + '%';
    const img = document.createElement('img');
    div.appendChild(img);
    field.appendChild(div);
    div.addEventListener('click', (e)=>onHoleTap(i, e));
    div.addEventListener('touchstart', (e)=>{ e.preventDefault(); onHoleTap(i, e); }, {passive:false});
    return { el:div, img, active:false, type:null, timer:null };
  });
}

/* ============ ゲーム状態 ============ */
let game = null;
let timerInterval = null;
let spawnTimeout = null;

function startGame(){
  buildHoles();
  game = { score:0, hits:0, timeLeft:15 };
  document.getElementById('hudScore').textContent = 0;
  document.getElementById('hudHits').textContent = 0;
  document.getElementById('timerBox').textContent = 15;
  document.getElementById('timerBox').classList.remove('warn');
  showScreen('screen-play');

  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    game.timeLeft--;
    document.getElementById('timerBox').textContent = game.timeLeft;
    if(game.timeLeft <= 5){ document.getElementById('timerBox').classList.add('warn'); }
    if(game.timeLeft <= 0){
      clearInterval(timerInterval);
      clearTimeout(spawnTimeout);
      holes.forEach(h=>{ if(h.timer) clearTimeout(h.timer); });
      endGame();
    }
  }, 1000);

  clearTimeout(spawnTimeout);
  scheduleSpawn();
}

function scheduleSpawn(){
  const delay = 420 + Math.random()*380;
  spawnTimeout = setTimeout(()=>{
    trySpawn();
    if(game && game.timeLeft > 0){ scheduleSpawn(); }
  }, delay);
}

function trySpawn(){
  const idle = holes.map((h,i)=>({h,i})).filter(o=>!o.h.active);
  if(idle.length === 0) return;
  const pick = idle[Math.floor(Math.random()*idle.length)];
  const hole = pick.h;

  const r = Math.random();
  let type;
  if(r < 0.07){ type = 'drum'; }
  else if(r < 0.25){ type = ['workerC','workerD','workerE','workerF'][Math.floor(Math.random()*4)]; }
  else { type = 'mole'; }

  hole.active = true;
  hole.type = type;
  hole.img.src = IMG[type].src;
  hole.img.classList.remove('hit');
  requestAnimationFrame(()=>{ hole.img.classList.add('show'); });

  const visibleTime = 700 + Math.random()*400;
  hole.timer = setTimeout(()=>{
    if(hole.active){
      hole.img.classList.remove('show');
      hole.active = false;
      hole.type = null;
    }
  }, visibleTime);
}

let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === 'suspended'){
    audioCtx.resume();
  }
  return audioCtx;
}

function playPopSound(rare){
  try{
    const ctx = ensureAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(700, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1100, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.16);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.17);
  } catch(e){}
}

function playPoyonSound(){
  try{
    const ctx = ensureAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    const t0 = ctx.currentTime;
    osc.frequency.setValueAtTime(500, t0);
    osc.frequency.linearRampToValueAtTime(650, t0 + 0.08);
    osc.frequency.linearRampToValueAtTime(380, t0 + 0.18);
    osc.frequency.linearRampToValueAtTime(460, t0 + 0.28);
    osc.frequency.linearRampToValueAtTime(260, t0 + 0.4);
    gain.gain.setValueAtTime(0.35, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.42);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(t0 + 0.43);
  } catch(e){}
}

function playBuzzSound(){
  try{
    const ctx = ensureAudio();
    const t0 = ctx.currentTime;
    [0, 0.12].forEach((delay)=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(240, t0+delay);
      osc.frequency.exponentialRampToValueAtTime(60, t0+delay+0.55);
      gain.gain.setValueAtTime(0.35, t0+delay);
      gain.gain.exponentialRampToValueAtTime(0.001, t0+delay+0.6);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t0+delay);
      osc.stop(t0+delay+0.65);
    });
  } catch(e){}
}

function onHoleTap(i, e){
  if(!game || game.timeLeft <= 0) return;
  const hole = holes[i];
  if(!hole.active) return;
  ensureAudio();

  const type = hole.type;

  clearTimeout(hole.timer);
  hole.img.classList.remove('show');
  hole.img.classList.add('hit');
  hole.active = false;
  hole.type = null;

  if(type === 'drum'){
    playBuzzSound();
    spawnHammerFx(hole.el);
    game.hits++;
    document.getElementById('hudHits').textContent = game.hits;
    endGame(true);
    return;
  }

  spawnHammerFx(hole.el);
  game.hits++;
  document.getElementById('hudHits').textContent = game.hits;

  if(type === 'mole'){
    playPopSound(false);
    game.score += 10;
    document.getElementById('hudScore').textContent = game.score;
    spawnScorePop(hole.el, 10);
  } else {
    playPoyonSound();
    game.timeLeft += 2;
    document.getElementById('timerBox').textContent = game.timeLeft;
    if(game.timeLeft > 5){ document.getElementById('timerBox').classList.remove('warn'); }
    spawnScorePop(hole.el, null, '+2秒');
  }
}

function spawnHammerFx(holeEl){
  const field = document.getElementById('holeField');
  const img = document.createElement('img');
  img.src = IMG.hammer.src;
  img.className = 'hammer-fx';
  img.style.left = holeEl.style.left;
  img.style.top = holeEl.style.top;
  field.appendChild(img);
  setTimeout(()=>img.remove(), 260);
}

function spawnScorePop(holeEl, points, customText){
  const field = document.getElementById('holeField');
  const el = document.createElement('div');
  el.className = 'pop-score';
  el.textContent = customText ? customText : ('+' + points);
  if(customText){ el.style.color = '#7fd97f'; }
  el.style.left = holeEl.style.left;
  el.style.top = holeEl.style.top;
  el.style.transform = 'translate(-50%,-50%)';
  field.appendChild(el);
  setTimeout(()=>el.remove(), 700);
}

function showBonus(text){
  const el = document.getElementById('bonusBanner');
  el.textContent = text;
  el.style.display = 'block';
  clearTimeout(showBonus._t);
  showBonus._t = setTimeout(()=>{ el.style.display = 'none'; }, 1200);
}

function endGame(byDrum){
  clearInterval(timerInterval);
  clearTimeout(spawnTimeout);
  holes.forEach(h=>{ if(h.timer) clearTimeout(h.timer); });
  game.timeLeft = 0;

  document.getElementById('resultTitle').textContent = byDrum ? 'ドラム缶にヒット…💥' : 'タイムアップ！';
  document.getElementById('resultScore').textContent = game.score;
  document.getElementById('resultHits').textContent = game.hits + ' 回';

  saveRankingRecord({
    name: playerName || 'ドライバー',
    score: game.score,
    hits: game.hits,
    date: new Date().toISOString().slice(0,16).replace('T',' ')
  });

  showScreen('screen-result');
}

/* ============ ランキング ============ */
function loadRankings(){
  try{ return JSON.parse(localStorage.getItem('sekineDaisakusenRankings')) || []; }
  catch(e){ return []; }
}
function saveRankingRecord(rec){
  const list = loadRankings();
  list.push(rec);
  localStorage.setItem('sekineDaisakusenRankings', JSON.stringify(list));
}
function openRanking(){
  renderRankingList();
  showScreen('screen-ranking');
}
function renderRankingList(){
  const list = loadRankings();
  const listEl = document.getElementById('rankList');
  if(list.length===0){
    listEl.innerHTML = '<div class="rank-empty">まだ記録がありません。<br>プレイしてみよう！</div>';
    return;
  }
  const sorted = [...list].sort((a,b)=>b.score-a.score).slice(0,20);
  listEl.innerHTML = sorted.map((r,i)=>{
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
    return `<div class="rank-item">
      <span class="rank-pos">${medal}</span>
      <span>${escapeHtml(r.name)}</span>
      <span>${r.score}</span>
    </div>`;
  }).join('');
}
function escapeHtml(s){
  return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
